name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Verify the committed bundle builds
        run: npm run bundle
